version: '3.8'

services:
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    stdin_open: true
    tty: true
    networks:
      - containers_network

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    env_file: 
      - ./backend/.env
    volumes:
      - ./backend:/app
      - ./static:/app/static
    depends_on:
      db:
        condition: service_healthy
    networks:
      - containers_network

  db:
    image: postgres:13
    environment:
      POSTGRES_USER: hackathon
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hackathon_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hackathon -d hackathon_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - containers_network
  nginx:
    image: nginx:1.25.1
    ports:
      - "443:443"
    volumes:
      - ./static:/app/static
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/hweb.key:/etc/nginx/hweb.key
      - ./nginx/hweb.crt:/etc/nginx/hweb.crt
    depends_on:
      - db
      - frontend
      - backend
    networks:
      - containers_network

volumes:
  postgres_data:

networks:
  containers_network:
    driver: bridge